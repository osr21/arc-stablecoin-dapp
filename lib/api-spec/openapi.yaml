openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Arc Stablecoin DApp API — Conditional Escrow, Payroll Vesting, Cross-chain Transfers
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: escrow
    description: Conditional escrow with onchain dispute and automatic release
  - name: vesting
    description: Programmable payroll and vesting in USDC or EURC
  - name: crosschain
    description: Cross-chain conditional transfers via Circle CCTP v2
  - name: dashboard
    description: Dashboard stats and activity feed
  - name: cctp
    description: Circle CCTP attestation proxy
  - name: x402
    description: Gasless USDC transfers via EIP-3009 TransferWithAuthorization
  - name: fx-forward
    description: On-chain EURC/USDC FX forward contracts with fixed settlement rate
  - name: htlc
    description: Hash Time Locked Contracts for trustless cross-chain atomic swaps
  - name: agent
    description: ERC-8004 on-chain agent identity registry with reputation scoring
  - name: split
    description: Fixed-share USDC/EURC fan-out split payment contracts

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /escrows:
    get:
      operationId: listEscrows
      tags: [escrow]
      summary: List escrows
      description: Returns all escrow contracts, optionally filtered by wallet address
      parameters:
        - in: query
          name: address
          schema:
            type: string
          description: Filter by depositor or beneficiary address
        - in: query
          name: status
          schema:
            type: string
            enum: [active, disputed, released, resolved]
          description: Filter by escrow status
      responses:
        "200":
          description: List of escrows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Escrow"

    post:
      operationId: createEscrow
      tags: [escrow]
      summary: Record a new escrow
      description: Records a new escrow after it is deployed onchain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscrowInput"
      responses:
        "201":
          description: Escrow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escrow"
        "400":
          description: Invalid input

  /escrows/{id}:
    get:
      operationId: getEscrow
      tags: [escrow]
      summary: Get escrow by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Escrow details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escrow"
        "404":
          description: Not found

  /escrows/{id}/dispute:
    post:
      operationId: disputeEscrow
      tags: [escrow]
      summary: Raise a dispute on escrow
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscrowDisputeInput"
      responses:
        "200":
          description: Dispute recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escrow"

  /escrows/{id}/release:
    post:
      operationId: releaseEscrow
      tags: [escrow]
      summary: Release escrow funds
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EscrowReleaseInput"
      responses:
        "200":
          description: Escrow released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Escrow"

  /vesting:
    get:
      operationId: listVestingSchedules
      tags: [vesting]
      summary: List vesting schedules
      parameters:
        - in: query
          name: address
          schema:
            type: string
          description: Filter by employer or beneficiary address
        - in: query
          name: token
          schema:
            type: string
            enum: [USDC, EURC]
          description: Filter by token
      responses:
        "200":
          description: List of vesting schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VestingSchedule"

    post:
      operationId: createVestingSchedule
      tags: [vesting]
      summary: Create a vesting schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VestingScheduleInput"
      responses:
        "201":
          description: Vesting schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VestingSchedule"

  /vesting/{id}:
    get:
      operationId: getVestingSchedule
      tags: [vesting]
      summary: Get vesting schedule by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vesting schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VestingSchedule"
        "404":
          description: Not found

  /vesting/{id}/claim:
    post:
      operationId: claimVesting
      tags: [vesting]
      summary: Record a vesting claim
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VestingClaimInput"
      responses:
        "200":
          description: Claim recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VestingSchedule"

  /crosschain:
    get:
      operationId: listCrosschainTransfers
      tags: [crosschain]
      summary: List cross-chain transfers
      parameters:
        - in: query
          name: address
          schema:
            type: string
          description: Filter by sender or recipient address
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, attesting, minting, complete, failed]
      responses:
        "200":
          description: List of cross-chain transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrosschainTransfer"

    post:
      operationId: createCrosschainTransfer
      tags: [crosschain]
      summary: Initiate a cross-chain transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrosschainTransferInput"
      responses:
        "201":
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosschainTransfer"

  /crosschain/{id}:
    get:
      operationId: getCrosschainTransfer
      tags: [crosschain]
      summary: Get cross-chain transfer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cross-chain transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosschainTransfer"
        "404":
          description: Not found

    patch:
      operationId: updateCrosschainTransferStatus
      tags: [crosschain]
      summary: Update cross-chain transfer status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrosschainStatusUpdate"
      responses:
        "200":
          description: Updated transfer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrosschainTransfer"
        "404":
          description: Not found

  /cctp/attestation/{txHash}:
    get:
      operationId: getCctpAttestation
      tags: [cctp]
      summary: Get Circle CCTP attestation for a burn transaction
      description: Proxies to Circle IRIS API to retrieve attestation needed for CCTP mint. Defaults to Arc Testnet as source chain.
      parameters:
        - in: path
          name: txHash
          required: true
          schema:
            type: string
          description: Source chain burn transaction hash
      responses:
        "200":
          description: Attestation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CctpAttestation"
        "202":
          description: Attestation still pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CctpAttestation"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /x402/send:
    post:
      operationId: x402Send
      tags: [x402]
      summary: Send USDC via EIP-3009
      description: |
        Accepts a MetaMask-signed EIP-3009 TransferWithAuthorization and submits
        the transferWithAuthorization call to the USDC contract on Arc Testnet.
        The server wallet pays gas; the signer pays no ETH.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/X402TransferAuth"
      responses:
        "200":
          description: Transfer confirmed on-chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/X402TransferReceipt"
        "400":
          description: Invalid request body
        "422":
          description: Transaction reverted on-chain
        "503":
          description: Payment relay not configured

  /fx-forwards:
    get:
      operationId: listFxForwards
      tags: [fx-forward]
      summary: List FX forward contracts
      parameters:
        - in: query
          name: address
          schema:
            type: string
          description: Filter by partyA or partyB address
        - in: query
          name: status
          schema:
            type: string
            enum: [created, funded, settled, cancelled]
      responses:
        "200":
          description: List of FX forwards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FXForward"

    post:
      operationId: createFxForward
      tags: [fx-forward]
      summary: Record a new FX forward
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FXForwardInput"
      responses:
        "201":
          description: FX forward created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FXForward"
        "400":
          description: Invalid input

  /fx-forwards/{id}:
    get:
      operationId: getFxForward
      tags: [fx-forward]
      summary: Get FX forward by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: FX forward details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FXForward"
        "404":
          description: Not found

  /fx-forwards/{id}/fund:
    post:
      operationId: fundFxForward
      tags: [fx-forward]
      summary: Record partyB funding the forward with EURC
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FXForwardFundInput"
      responses:
        "200":
          description: Forward funded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FXForward"
        "404":
          description: Not found

  /fx-forwards/{id}/settle:
    post:
      operationId: settleFxForward
      tags: [fx-forward]
      summary: Record settlement of the forward at maturity
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FXForwardSettleInput"
      responses:
        "200":
          description: Forward settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FXForward"
        "404":
          description: Not found

  /fx-forwards/{id}/cancel:
    post:
      operationId: cancelFxForward
      tags: [fx-forward]
      summary: Record cancellation of an unfunded forward
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FXForwardCancelInput"
      responses:
        "200":
          description: Forward cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FXForward"
        "404":
          description: Not found

  /htlc:
    get:
      operationId: listHtlcSwaps
      tags: [htlc]
      summary: List HTLC swaps
      parameters:
        - in: query
          name: address
          schema:
            type: string
          description: Filter by depositor or recipient address
        - in: query
          name: status
          schema:
            type: string
            enum: [active, claimed, refunded]
      responses:
        "200":
          description: List of HTLC swaps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HTLCSwap"

    post:
      operationId: createHtlcSwap
      tags: [htlc]
      summary: Record a new HTLC swap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTLCSwapInput"
      responses:
        "201":
          description: HTLC swap created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTLCSwap"
        "400":
          description: Invalid input

  /htlc/{id}:
    get:
      operationId: getHtlcSwap
      tags: [htlc]
      summary: Get HTLC swap by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: HTLC swap details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTLCSwap"
        "404":
          description: Not found

  /htlc/{id}/claim:
    post:
      operationId: claimHtlcSwap
      tags: [htlc]
      summary: Record a claim on an HTLC swap (reveals preimage)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTLCClaimInput"
      responses:
        "200":
          description: HTLC claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTLCSwap"
        "404":
          description: Not found

  /htlc/{id}/refund:
    post:
      operationId: refundHtlcSwap
      tags: [htlc]
      summary: Record a refund on an expired HTLC swap
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTLCRefundInput"
      responses:
        "200":
          description: HTLC refunded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTLCSwap"
        "404":
          description: Not found

  /htlc/{id}/relay:
    post:
      operationId: relayHtlcSwap
      tags: [htlc]
      summary: Record CCTP attestation relay on destination chain (crosschain_cctp mode only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTLCRelayInput"
      responses:
        "200":
          description: HTLC relay recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTLCSwap"
        "404":
          description: Not found

  /agents:
    get:
      operationId: listAgents
      tags: [agent]
      summary: List registered agents
      parameters:
        - in: query
          name: owner
          schema:
            type: string
          description: Filter by owner address
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, deactivated]
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

    post:
      operationId: createAgent
      tags: [agent]
      summary: Register a new agent identity (ERC-8004)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid input

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agent]
      summary: Get agent by DB id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found

  /agents/{id}/activity:
    post:
      operationId: recordAgentActivity
      tags: [agent]
      summary: Record an economic activity for an agent (updates volume + reputation)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentActivityInput"
      responses:
        "200":
          description: Updated agent with new reputation score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid input
        "404":
          description: Not found

  /agents/{id}/status:
    patch:
      operationId: updateAgentStatus
      tags: [agent]
      summary: Update agent status (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentStatusInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found

  /splits:
    get:
      operationId: listSplits
      tags: [split]
      summary: List payment splits
      parameters:
        - in: query
          name: creator
          schema:
            type: string
          description: Filter by creator address
      responses:
        "200":
          description: List of splits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Split"

    post:
      operationId: createSplit
      tags: [split]
      summary: Create a new fixed-share payment split
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitInput"
      responses:
        "201":
          description: Split created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Split"
        "400":
          description: Invalid input

  /splits/{id}:
    get:
      operationId: getSplit
      tags: [split]
      summary: Get split by DB id (includes distribution history)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Split record with distributions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Split"
        "404":
          description: Not found

  /splits/{id}/distribute:
    post:
      operationId: distributeSplit
      tags: [split]
      summary: Record a distribution event for a split
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitDistributeInput"
      responses:
        "200":
          description: Updated split after distribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Split"
        "400":
          description: Invalid input
        "404":
          description: Not found

  /splits/{id}/deactivate:
    patch:
      operationId: deactivateSplit
      tags: [split]
      summary: Deactivate a split (creator only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitDeactivateInput"
      responses:
        "200":
          description: Deactivated split
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Split"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Escrow:
      type: object
      required: [id, depositor, beneficiary, arbiter, token, amount, releaseTime, status, contractAddress, txHash, chainId, createdAt]
      properties:
        id:
          type: integer
        depositor:
          type: string
          description: Depositor wallet address
        beneficiary:
          type: string
          description: Beneficiary wallet address
        arbiter:
          type: string
          description: Arbiter wallet address for disputes
        token:
          type: string
          enum: [USDC, EURC]
        amount:
          type: string
          description: Amount in token units (6 decimals for USDC/EURC)
        releaseTime:
          type: integer
          description: Unix timestamp for automatic release
        status:
          type: string
          enum: [active, disputed, released, resolved]
        conditionType:
          type: ["string", "null"]
          enum: [time_based, milestone, oracle, null]
        conditionData:
          type: ["string", "null"]
          description: JSON-encoded condition parameters
        contractAddress:
          type: string
          description: Deployed escrow contract address
        txHash:
          type: string
          description: Deployment transaction hash
        disputeTxHash:
          type: ["string", "null"]
        releaseTxHash:
          type: ["string", "null"]
        disputeReason:
          type: ["string", "null"]
        chainId:
          type: integer
          description: Chain ID (5042002 for Arc Testnet)
        onChainId:
          type: ["integer", "null"]
          description: On-chain escrow ID from the contract (used for release/autoRelease)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EscrowInput:
      type: object
      required: [depositor, beneficiary, arbiter, token, amount, releaseTime, contractAddress, txHash]
      properties:
        depositor:
          type: string
        beneficiary:
          type: string
        arbiter:
          type: string
        token:
          type: string
          enum: [USDC, EURC]
        amount:
          type: string
        releaseTime:
          type: integer
        conditionType:
          type: string
          enum: [time_based, milestone, oracle]
        conditionData:
          type: string
        contractAddress:
          type: string
        txHash:
          type: string
        chainId:
          type: integer
        onChainId:
          type: integer

    EscrowDisputeInput:
      type: object
      required: [txHash, reason]
      properties:
        txHash:
          type: string
        reason:
          type: string

    EscrowReleaseInput:
      type: object
      required: [txHash, resolution]
      properties:
        txHash:
          type: string
        resolution:
          type: string
          enum: [beneficiary, depositor]

    VestingSchedule:
      type: object
      required: [id, employer, beneficiary, token, totalAmount, cliffDuration, vestingDuration, startTime, amountClaimed, contractAddress, txHash, chainId, createdAt]
      properties:
        id:
          type: integer
        employer:
