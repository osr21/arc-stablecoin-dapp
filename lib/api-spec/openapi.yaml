    HTLCSwap:
      type: object
      required: [id, depositor, recipient, token, amount, hashlock, timelock, status, contractAddress, txHash, chainId, createdAt]
      properties:
        id:
          type: integer
        depositor:
          type: string
          description: Address that locked tokens; can refund after timelock
        recipient:
          type: string
          description: "Single-chain: address that claims here. Crosschain CCTP: for display only — actual recipient is mintRecipient on dest chain."
        token:
          type: string
          enum: [USDC, EURC]
        amount:
          type: string
          description: Token amount in raw 6-decimal base units
        hashlock:
          type: string
          description: "keccak256(abi.encode(preimage)) — computed off-chain by depositor"
        timelock:
          type: integer
          description: Unix timestamp after which depositor can refund
        status:
          type: string
          enum: [active, claimed, relayed, refunded]
        preimage:
          type: ["string", "null"]
          description: Revealed preimage (bytes32 hex); null until claimed
        claimTxHash:
          type: ["string", "null"]
          description: Claim transaction hash (also triggers CCTP burn for crosschain mode)
        refundTxHash:
          type: ["string", "null"]
          description: Refund transaction hash
        contractAddress:
          type: string
        txHash:
          type: string
          description: Creation transaction hash
        onChainId:
          type: ["integer", "null"]
          description: On-chain HTLC ID from the contract
        chainId:
          type: integer
        swapMode:
          type: ["string", "null"]
          enum: [single_chain, crosschain_cctp, null]
          description: "single_chain = tokens stay on Arc; crosschain_cctp = claim triggers depositForBurn via CCTP"
        destinationDomain:
          type: ["integer", "null"]
          description: "CCTP destination domain (0=Eth Sepolia, 3=Arb Sepolia, 6=Base Sepolia). Null for single-chain."
        mintRecipient:
          type: ["string", "null"]
          description: "bytes32 hex of the USDC recipient on the destination chain. Null for single-chain."
        maxFee:
          type: ["string", "null"]
          description: "Circle attestation fee in raw base units. Null for single-chain."
        minFinalityThreshold:
          type: ["integer", "null"]
          description: "CCTP finality threshold: 2000=finalized, 1000=fast. Null for single-chain."
        relayTxHash:
          type: ["string", "null"]
          description: "Tx hash of the CCTP attestation relay on the destination chain. Null until relayed."
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HTLCSwapInput:
      type: object
      required: [depositor, recipient, token, amount, hashlock, timelock, contractAddress, txHash]
      properties:
        depositor:
          type: string
        recipient:
          type: string
        token:
          type: string
          enum: [USDC, EURC]
        amount:
          type: string
        hashlock:
          type: string
          description: keccak256(abi.encode(preimage)) as 0x-prefixed hex bytes32
        timelock:
          type: integer
        contractAddress:
          type: string
        txHash:
          type: string
        chainId:
          type: integer
        onChainId:
          type: integer
        swapMode:
          type: string
          enum: [single_chain, crosschain_cctp]
        destinationDomain:
          type: integer
        mintRecipient:
          type: string
          description: bytes32 hex of recipient on destination chain
        maxFee:
          type: string
        minFinalityThreshold:
          type: integer

